spring.application.name=digitaltimecapsule
spring.datasource.url=jdbc:postgresql://dpg-d0a2hc1r0fns73e35rf0-a.render.com:5432/digitaltimecapsuledb
spring.datasource.username=dtc
spring.datasource.password=LyZ9fmRyco0VKSTt5JWLroYFFIxJwmSz
spring.datasource.driver-class-name=org.postgresql.Driver
# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
upload.dir=uploads
upload.max-size=10485760
upload.allowed-types=image/*,video/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt

# Security configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Configuration
server.port=8080

# File Upload Configuration
app.upload.dir=uploads
app.max-file-size=10MB
app.allowed-image-types=jpg,jpeg,png,gif
app.allowed-video-types=mp4,webm,ogg
app.allowed-doc-types=pdf,doc,docx,txt

# Security Configuration
app.jwt.secret=your-secret-key-here
app.jwt.expiration=86400000 # 24 hours

# File Cleanup Configuration
app.cleanup.temp-max-age-hours=24
app.cleanup.temp-dir=uploads/temp
app.cleanup.failed-dir=uploads/failed
app.cleanup.enabled=true
app.cleanup.schedule=0 * * * * * # Run every hour

# Logging Configuration
logging.level.root=INFO
logging.level.com.digitaltimecapsule=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# Encryption Configuration
app.encryption.key-file=encryption.key
app.encryption.enabled=true
app.encryption.algorithm=AES/GCM/NoPadding
app.encryption.key-size=256
app.encryption.iv-length=12
app.encryption.tag-length=128

# File Integrity Configuration
app.integrity.hash-algorithm=SHA-256
app.integrity.check-interval=3600 # 1 hour in seconds
app.integrity.enabled=true
