name: Frontend CI

on:
  push:
    branches: [ main, feature/* ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, feature/* ]
    paths:
      - 'frontend/**'
    paths-ignore:
    - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run linting
        run: npm run lint
        working-directory: ./frontend

      - name: Run tests
        run: |
          if ls frontend/src/**/*.test.{js,jsx,ts,tsx} 1> /dev/null 2>&1; then
            npm test
          else
            echo "No test files found, skipping tests."
          fi
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
