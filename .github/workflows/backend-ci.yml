name: Backend CI

on:
  push:
    branches: [ main, feature/* ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main, feature/* ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file backend/digitaltimecapsule/pom.xml

      - name: Run tests
        run: mvn test --file backend/digitaltimecapsule/pom.xml

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2