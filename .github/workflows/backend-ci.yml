name: Backend CI

on:
  push:
    branches: [ main, feature/* ]
    paths:
      - 'backend/**'
    paths-ignore:
    - 'frontend/**'
  pull_request:
    branches: [ main, feature/* ]
    paths:
      - 'backend/**'
    paths-ignore:
    - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: digital_time_capsule
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_USER: user
          MYSQL_PASSWORD: pass
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create application.properties for CI
        run: |
          mkdir -p backend/digitaltimecapsule/src/main/resources
          cat <<EOF > backend/digitaltimecapsule/src/main/resources/application.properties
          spring.datasource.url=jdbc:mysql://localhost:3306/digital_time_capsule
          spring.datasource.username=user
          spring.datasource.password=pass
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=true
          EOF

      - name: Build with Maven
        run: mvn -B package --file backend/digitaltimecapsule/pom.xml

      - name: Run tests
        run: mvn test --file backend/digitaltimecapsule/pom.xml

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
